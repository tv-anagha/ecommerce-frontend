name: Product MF CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: product-mf

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: product-mf/package-lock.json

      - name: Install Dependencies
        run: |
          npm ci || (rm -rf node_modules package-lock.json && npm install)

      - name: Build
        run: npm run build